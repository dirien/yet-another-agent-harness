version: 2

env:
  - CGO_ENABLED=0

builds:
  - binary: yaah
    main: ./cmd/yaah
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE*
      - README.md

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"

sboms:
  - artifacts: archive

brews:
  - repository:
      owner: dirien
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: yaah
    homepage: https://github.com/dirien/yet-another-agent-harness
    description: "Yet Another Agent Harness — Go toolkit for managing Claude Code configuration"
    license: MIT
    install: |
      bin.install "yaah"
    test: |
      system "#{bin}/yaah", "--help"

changelog:
  use: github
  groups:
    - title: "Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Others"
      order: 999
